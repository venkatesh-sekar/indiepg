name: Release

# Cut a release by pushing a tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds the static linux binaries the install.sh bootstrap expects
# (indiepg_linux_amd64 / indiepg_linux_arm64) plus a checksums file, and
# attaches them to the GitHub Release for that tag.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build release binaries
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          ldflags="-s -w -X github.com/venkatesh-sekar/indiepg/internal/core.Version=${version}"
          for arch in amd64 arm64; do
            echo "building indiepg_linux_${arch}"
            GOOS=linux GOARCH="${arch}" go build -trimpath -ldflags "${ldflags}" \
              -o "indiepg_linux_${arch}" ./cmd/indiepg
          done
          sha256sum indiepg_linux_amd64 indiepg_linux_arm64 > "indiepg_${version}_checksums.txt"
          cat "indiepg_${version}_checksums.txt"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            indiepg_linux_amd64
            indiepg_linux_arm64
            indiepg_${{ github.ref_name }}_checksums.txt
          generate_release_notes: true
